name: Perl CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  perl-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.36"

      - name: Install dependencies
        run: |
          if ! command -v cpanm >/dev/null 2>&1; then
            cpan App::cpanminus
          fi
          cpanm --notest Net::DNS IO::Socket::SSL

      - name: Perl syntax check
        run: perl -c poolmon
